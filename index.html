<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作业提交页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        body {
            min-height: 100vh;
            background: url('https://p3-flow-image-sign.byteimg.com/tos-cn-i-a9r32ns6d0/06c99009393b40189909119119031333~tplv-a9r32ns6d0-image.image') no-repeat center center fixed;
            background-size: cover;
            position: relative;
        }

        /* 半透明遮罩，提升文字可读性 */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.3);
            z-index: 1;
        }

        /* 学号样式 - 左上角 */
        .student-id {
            position: absolute;
            top: 30px;
            left: 30px;
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            z-index: 2;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 20px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
        }

        /* 作业列表容器 - 居中 */
        .homework-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            width: 90%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .homework-title {
            text-align: center;
            font-size: 28px;
            color: #333;
            margin-bottom: 30px;
            font-weight: bold;
            border-bottom: 2px solid #ffb7c5;
            padding-bottom: 15px;
        }

        .homework-list {
            list-style: none;
        }

        .homework-list li {
            margin: 15px 0;
            text-align: center;
        }

        .homework-list a {
            display: block;
            padding: 15px;
            font-size: 18px;
            color: #333;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            background: linear-gradient(to right, #fff, #f8f8f8);
            border: 1px solid #eee;
        }

        .homework-list a:hover {
            background: linear-gradient(to right, #ffb7c5, #ffd1dc);
            color: #fff;
            transform: translateX(5px);
            box-shadow: 0 4px 15px rgba(255, 183, 197, 0.4);
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .student-id {
                font-size: 18px;
                top: 15px;
                left: 15px;
                padding: 8px 15px;
            }

            .homework-container {
                padding: 25px;
            }

            .homework-title {
                font-size: 22px;
            }

            .homework-list a {
                font-size: 16px;
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- 学号区域 -->
    <div class="student-id">学号：25051030312</div>

    <!-- 作业列表区域 -->
    <div class="homework-container">
        <h2 class="homework-title">作业提交列表</h2>
        <ul class="homework-list">
            <li><a href=" "></a> 第一次作业- HTML基础1</a ></li>
           
        </ul>
    </div>
</body>
</html>
